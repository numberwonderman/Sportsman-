<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elo Pro | Statistical Matchup Engine</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 2rem; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.5rem; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #3b82f6; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        button:hover { background: #2563eb; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #334155; border-radius: 0.5rem; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Elo Matchup Predictor</h2>
    <input type="number" id="rating-a" placeholder="Team A Elo (e.g. 1500)">
    <input type="number" id="rating-b" placeholder="Team B Elo (e.g. 1600)">
    <button onclick="calculate()">Calculate Win Probability</button>
    
    <div id="result">Enter ratings to see prediction.</div>
</div>

<script>
    function calculate() {
        const rA = parseFloat(document.getElementById('rating-a').value);
        const rB = parseFloat(document.getElementById('rating-b').value);
        const resDiv = document.getElementById('result');

        if (isNaN(rA) || isNaN(rB)) {
            resDiv.innerHTML = "Please enter valid numbers.";
            return;
        }

        // Elo Win Probability Formula
        const probA = 1 / (1 + Math.pow(10, (rB - rA) / 400));
        const probB = 1 - probA;

        resDiv.innerHTML = `
            <strong>Results:</strong><br>
            Team A Win Prob: ${(probA * 100).toFixed(2)}%<br>
            Team B Win Prob: ${(probB * 100).toFixed(2)}%
        `;
    }
</script>
</body>
</html>
